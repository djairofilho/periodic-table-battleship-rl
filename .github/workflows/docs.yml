name: Docs

on:
  push:
    branches: [main]
    paths:
      - "mkdocs.yml"
      - "docs/**"
      - "scripts/sync_site_assets.py"
      - ".github/workflows/docs.yml"
      - "pyproject.toml"
  pull_request:
    paths:
      - "mkdocs.yml"
      - "docs/**"
      - "scripts/sync_site_assets.py"
      - ".github/workflows/docs.yml"
      - "pyproject.toml"

permissions:
  contents: read

concurrency:
  group: periodic-table-battleship-rl-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Instalar Python
        run: uv python install 3.11

      - name: Instalar dependências de docs
        run: uv sync --extra docs

      - name: Sync assets do site
        run: uv run python scripts/sync_site_assets.py --strict

      - name: Build do site
        run: uv run mkdocs build

      - name: Upload de artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
